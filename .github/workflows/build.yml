name: Build APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Configure Keystore and Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            cat <<EOF > key.properties
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          else
            echo "Keystore secrets not found, skipping cryptographic signing setup."
          fi

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "APP_VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/NFile-${{ env.APP_VERSION }}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/NFile-${{ env.APP_VERSION }}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/NFile-${{ env.APP_VERSION }}-x86_64.apk

      - name: Upload APKs to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nfile-${{ env.APP_VERSION }}-apks
          path: build/app/outputs/flutter-apk/NFile-${{ env.APP_VERSION }}-*.apk

      - name: Release APKs
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: "NFile Release ${{ env.APP_VERSION }}"
          body: |
            ### Official NFile Production Release ${{ env.APP_VERSION }}
            * **Optimized & Split by Architecture**: Download `arm64-v8a` for 64-bit modern devices (~15MB).
            * Professionally signed and compiled with R8 code shrinking and uncompressed native libs.
          draft: false
          prerelease: false
          make_latest: true
          files: build/app/outputs/flutter-apk/NFile-${{ env.APP_VERSION }}-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
