Builds:
  - versionName: 1.0.42
    versionCode: 421
    commit: 0ccf9cbb8f7bce22e083af7ffb6d4a753735eb2f
    output: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - cd ..
      - mv com.rubex.nfile /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - JFILE=$(find .pub-cache -name FlutterAvifPlugin.java | head -1)
      - test -z "$JFILE" || echo "// cleared" > "$JFILE"
      - popd
      - mv /tmp/build com.rubex.nfile
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - mv com.rubex.nfile /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform android-arm
      - popd
      - mv /tmp/build com.rubex.nfile

