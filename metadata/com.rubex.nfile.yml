WebSite: https://github.com/Senzme/NFile
SourceCode: https://github.com/Senzme/NFile
IssueTracker: https://github.com/Senzme/NFile/issues

AutoName: NFile

RepoType: git
Repo: https://github.com/Senzme/NFile.git

Builds:
  - versionName: 1.0.42
    versionCode: 42
    commit: cfbd10d81a069339fe2eeb8156a6546e8582acff
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - cd ..
      - mv com.rubex.nfile /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get --enforce-lockfile
      - popd
      - mv /tmp/build com.rubex.nfile
    scandelete:
      - .pub-cache
    build:
      - cd ..
      - mv com.rubex.nfile /tmp/build
      - pushd /tmp/build
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release
      - popd
      - mv /tmp/build com.rubex.nfile

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.42
CurrentVersionCode: 42
